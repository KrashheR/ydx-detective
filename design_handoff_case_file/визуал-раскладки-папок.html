document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

8ffb4ab7-2303-4cbe-865a-5578ad0a46e3\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8584030f-ad09-495b-99ea-db691ac69b5a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"819929f2-6801-4059-859a-2eaf2d11fca4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;}\n  .fan-folder{transition:transform .2s cubic-bezier(.2,.8,.3,1), box-shadow .2s ease;}\n  .fan-folder:hover{transform:translateY(-14px) rotate(0deg) !important; z-index:90 !important; box-shadow:0 26px 50px rgba(40,28,10,.4) !important;}\n  .grid-folder{transition:transform .16s ease, box-shadow .16s ease;}\n  .grid-folder:hover{transform:translateY(-5px); box-shadow:0 18px 34px rgba(40,28,10,.32);}\n  .a-tab{transition:transform .15s ease, background .15s ease;}\n  .a-tab:hover{transform:translateY(-3px);}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:max-content; min-width:100%; min-height:100vh; box-sizing:border-box; padding:48px; background:#e7e5df; font-family:'Inter',system-ui,sans-serif;\">\n\n  <div style=\"max-width:920px; margin-bottom:40px;\">\n    <div style=\"font:700 12px 'JetBrains Mono'; letter-spacing:.2em; text-transform:uppercase; color:#9a8c6e;\">Где ложь? · UX-разбор экрана стола<\u002Fdiv>\n    <h1 style=\"font:700 34px/1.12 'Spectral',serif; color:#241c12; margin:12px 0 12px; letter-spacing:-.01em;\">Папки на столе — три интересные раскладки вместо колонки<\u002Fh1>\n    <p style=\"margin:0; max-width:760px; font:400 15px/1.65 'Inter'; color:#5d5341; text-wrap:pretty;\">Сейчас дела идут одной вертикальной колонкой: при 38 делах это бесконечный скролл, и стол ощущается как список, а не как стол. Ниже — три направления, как разложить папки интереснее, оставаясь в бумажно-архивной метафоре. Палитра — сепия, как в текущем билде. <b>Концепт A интерактивный<\u002Fb> — кликайте вкладки.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"display:flex; flex-direction:column; gap:40px;\">\n\n    <!-- ============================ CONCEPT A ============================ -->\n    <div>\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:6px;\">\n        <span style=\"font:800 13px 'Inter'; letter-spacing:.04em; color:#fff; background:#876520; padding:6px 13px; border-radius:5px;\">A · КАРТОТЕКА<\u002Fspan>\n        <span style=\"font:600 16px 'Spectral',serif; color:#241c12;\">Вкладки папок + одна открытая<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 16px; max-width:880px; font:400 13.5px/1.55 'Inter'; color:#6e6149;\">Все дела — это ряд вкладок-ярлыков, как корешки подвесных папок в ящике картотеки. Выбранное дело раскрывается в крупную папку под вкладками. Один экран вмещает доступ ко всем 38 делам и при этом показывает одно дело подробно. Заблокированные вкладки приглушены.<\u002Fp>\n\n      <div style=\"width:880px; background:#e8e1d0; border:1px solid #cdbf9f; border-radius:10px; padding:22px 22px 26px; box-shadow:0 1px 3px rgba(0,0,0,.12), 0 26px 50px rgba(40,28,10,.12);\">\n        <div style=\"font:700 11px 'Inter'; letter-spacing:.14em; color:#8a7a56; margin-bottom:14px;\">ВЫБЕРИТЕ ДЕЛО ДЛЯ РАССЛЕДОВАНИЯ<\u002Fdiv>\n\n        <!-- TAB STRIP -->\n        <div style=\"display:flex; align-items:flex-end; gap:5px; overflow-x:auto; padding:8px 2px 0; min-height:62px;\">\n          <sc-for list=\"{{ aTabs }}\" as=\"t\" hint-placeholder-count=\"9\">\n            <div class=\"a-tab\" onclick=\"{{ t.onPick }}\" style=\"flex:none; width:108px; cursor:pointer; background:{{ t.bg }}; border:1px solid {{ t.edge }}; border-bottom:none; border-radius:7px 7px 0 0; padding:8px 9px 12px; margin-top:{{ t.offset }}px; opacity:{{ t.op }}; box-shadow:{{ t.sh }};\">\n              <div style=\"font:600 8px 'JetBrains Mono'; letter-spacing:.06em; color:{{ t.sub }};\">{{ t.num }}<\u002Fdiv>\n              <div style=\"font:600 11px/1.15 'Inter'; color:{{ t.ink }}; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ t.short }}<\u002Fdiv>\n              <div style=\"font:600 8px 'JetBrains Mono'; color:{{ t.sub }}; margin-top:5px;\">{{ t.foot }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- OPEN FOLDER -->\n        <div style=\"position:relative; background:{{ aBg }}; border:1px solid {{ aEdge }}; border-radius:0 9px 9px 9px; padding:24px 24px 22px; box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 16px 34px rgba(40,28,10,.22); overflow:hidden;\">\n          <div style=\"position:absolute; inset:0; background:repeating-linear-gradient(90deg,rgba(0,0,0,.025) 0 2px,transparent 2px 8px); pointer-events:none;\"><\u002Fdiv>\n\n          <sc-if value=\"{{ aDaily }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute; top:16px; right:-34px; transform:rotate(34deg); background:#b4231f; color:#fff; font:800 11px 'JetBrains Mono'; letter-spacing:.16em; padding:5px 42px;\">СРОЧНО<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ aConfid }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute; top:18px; right:18px; transform:rotate(-7deg); border:2px solid #b4231f; color:#b4231f; font:600 10px 'JetBrains Mono'; letter-spacing:.08em; padding:4px 9px; border-radius:3px; opacity:.85;\">КОНФИДЕНЦИАЛЬНО<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"font:600 11px 'JetBrains Mono'; letter-spacing:.08em; color:{{ aSubInk }};\">{{ aNum }}<\u002Fdiv>\n          <div style=\"font:700 26px 'Spectral',serif; color:{{ aInk }}; margin-top:7px; max-width:74%;\">{{ aTitle }}<\u002Fdiv>\n\n          <sc-if value=\"{{ aHasClient }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex; align-items:center; gap:12px; margin-top:18px;\">\n              <div style=\"width:42px; height:42px; border-radius:50%; background:rgba(0,0,0,.16); border:1px solid rgba(0,0,0,.22); flex:none;\"><\u002Fdiv>\n              <div>\n                <div style=\"font:600 14px 'Inter'; color:{{ aInk }};\">{{ aClient }}<\u002Fdiv>\n                <div style=\"font:600 12px 'JetBrains Mono'; color:{{ aSubInk }}; margin-top:2px;\">{{ aSum }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ aDaily }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; gap:9px; margin-top:18px;\">\n              <span style=\"font:700 12px 'Inter'; background:#3a2705; color:#f0c46b; padding:5px 11px; border-radius:6px;\">Награда ×5<\u002Fspan>\n              <span style=\"font:700 12px 'Inter'; background:rgba(58,39,5,.16); color:#3a2705; padding:5px 11px; border-radius:6px;\">Сложность ×2<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"height:1px; background:rgba(0,0,0,.16); margin:20px 0 14px;\"><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; align-items:center;\">\n            <div style=\"display:flex; align-items:center; gap:12px;\">\n              <span style=\"font:500 12px 'Inter'; color:{{ aSubInk }};\">{{ aDocs }}<\u002Fspan>\n              <span style=\"display:flex; gap:4px; align-items:center;\">\n                <sc-for list=\"{{ aPips }}\" as=\"p\" hint-placeholder-count=\"3\">\n                  <span style=\"width:7px; height:7px; border-radius:50%; background:{{ p.c }};\"><\u002Fspan>\n                <\u002Fsc-for>\n                <span style=\"font:600 10px 'JetBrains Mono'; color:{{ aSubInk }}; margin-left:3px;\">{{ aDiffLabel }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font:700 14px 'Inter'; color:{{ aCtaColor }};\">{{ aCta }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"margin:14px 0 0; max-width:880px; font:400 12.5px/1.55 'Inter'; color:#8a7c60;\"><b style=\"color:#6e6149;\">Почему хорошо:<\u002Fb> постоянный доступ ко всем делам без скролла, фокус на одном деле, прямая метафора картотеки. <b style=\"color:#6e6149;\">Риск:<\u002Fb> много вкладок → нужен горизонтальный скролл / группировка по главам.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ============================ CONCEPT B ============================ -->\n    <div>\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:6px;\">\n        <span style=\"font:800 13px 'Inter'; letter-spacing:.04em; color:#fff; background:#95431f; padding:6px 13px; border-radius:5px;\">B · ВЕЕР НА СТОЛЕ<\u002Fspan>\n        <span style=\"font:600 16px 'Spectral',serif; color:#241c12;\">Папки разложены внахлёст<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 16px; max-width:880px; font:400 13.5px/1.55 'Inter'; color:#6e6149;\">Папки физически лежат на столе под лёгкими углами, перекрывая друг друга — как стопка, которую детектив разложил веером. Активное дело вытянуто вперёд и выпрямлено, остальные выглядывают корешками. Наведение поднимает папку. Самая тактильная, «настольная» подача.<\u002Fp>\n\n      <div style=\"width:880px; height:430px; position:relative; background:radial-gradient(120% 90% at 50% 8%, #ece5d4 0%, #ddd2b9 70%, #d2c6aa 100%); border:1px solid #cdbf9f; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.12), 0 26px 50px rgba(40,28,10,.12);\">\n        <div style=\"position:absolute; top:18px; left:24px; font:700 11px 'Inter'; letter-spacing:.14em; color:#8a7a56;\">РАЗБЕРИТЕ СТОПКУ ДЕЛ<\u002Fdiv>\n\n        <sc-for list=\"{{ fan }}\" as=\"f\" hint-placeholder-count=\"6\">\n          <div class=\"fan-folder\" style=\"position:absolute; left:{{ f.x }}px; top:{{ f.y }}px; width:{{ f.w }}px; transform:rotate({{ f.rot }}deg); z-index:{{ f.z }}; cursor:pointer;\">\n            <!-- tab -->\n            <div style=\"width:118px; height:20px; background:{{ f.edge }}; border-radius:7px 7px 0 0; margin-left:18px;\"><\u002Fdiv>\n            <div style=\"background:{{ f.bg }}; border:1px solid {{ f.edge }}; border-radius:2px 9px 9px 9px; padding:16px 18px 18px; box-shadow:0 12px 26px rgba(40,28,10,.26); position:relative; overflow:hidden;\">\n              <div style=\"position:absolute; inset:0; background:repeating-linear-gradient(90deg,rgba(0,0,0,.022) 0 2px,transparent 2px 8px); pointer-events:none;\"><\u002Fdiv>\n              <sc-if value=\"{{ f.daily }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute; top:12px; right:-30px; transform:rotate(34deg); background:#b4231f; color:#fff; font:800 9px 'JetBrains Mono'; letter-spacing:.14em; padding:4px 34px;\">СРОЧНО<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"font:600 9px 'JetBrains Mono'; letter-spacing:.06em; color:{{ f.sub }};\">{{ f.num }}<\u002Fdiv>\n              <div style=\"font:700 17px 'Spectral',serif; color:{{ f.ink }}; margin-top:5px; max-width:90%;\">{{ f.title }}<\u002Fdiv>\n              <sc-if value=\"{{ f.showMeta }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font:500 11px 'Inter'; color:{{ f.sub }}; margin-top:7px;\">{{ f.meta }}<\u002Fdiv>\n                <div style=\"display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:12px; border-top:1px solid rgba(0,0,0,.14);\">\n                  <span style=\"font:500 11px 'Inter'; color:{{ f.sub }};\">{{ f.docs }}<\u002Fspan>\n                  <span style=\"font:700 12px 'Inter'; color:{{ f.ink }};\">{{ f.cta }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ f.locked }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font:600 10px 'JetBrains Mono'; color:{{ f.sub }}; margin-top:8px;\">{{ f.lock }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <p style=\"margin:14px 0 0; max-width:880px; font:400 12.5px/1.55 'Inter'; color:#8a7c60;\"><b style=\"color:#6e6149;\">Почему хорошо:<\u002Fb> живой «настольный» характер, приятно разбирать руками, сильная атмосфера. <b style=\"color:#6e6149;\">Риск:<\u002Fb> хуже масштабируется на 38 дел и сложнее по доступности — нужен запасной список.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ============================ CONCEPT C ============================ -->\n    <div>\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:6px;\">\n        <span style=\"font:800 13px 'Inter'; letter-spacing:.04em; color:#fff; background:#1f3a5f; padding:6px 13px; border-radius:5px;\">C · ДОСКА · СЕТКА<\u002Fspan>\n        <span style=\"font:600 16px 'Spectral',serif; color:#241c12;\">Дело дня героем + сетка папок<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 16px; max-width:880px; font:400 13.5px/1.55 'Inter'; color:#6e6149;\">Дело дня — крупный герой сверху, остальные дела — компактная сетка папок 2-в-ряд. Видно сразу 6 дел вместо одного, легко охватить прогресс по всем 38. Статус, сложность и условие разблокировки читаются с одного взгляда. Самая «игровая» подача выбора уровня.<\u002Fp>\n\n      <div style=\"width:880px; background:#e8e1d0; border:1px solid #cdbf9f; border-radius:10px; padding:22px; box-shadow:0 1px 3px rgba(0,0,0,.12), 0 26px 50px rgba(40,28,10,.12);\">\n        <div style=\"font:700 11px 'Inter'; letter-spacing:.14em; color:#8a7a56; margin-bottom:14px;\">ВЫБЕРИТЕ ДЕЛО ДЛЯ РАССЛЕДОВАНИЯ<\u002Fdiv>\n\n        <!-- HERO daily -->\n        <div style=\"position:relative; background:linear-gradient(135deg,#e6b052,#d6982f); border:1px solid #b07d1f; border-radius:9px; padding:20px 22px; overflow:hidden; box-shadow:0 12px 28px rgba(40,28,10,.2); cursor:pointer;\">\n          <div style=\"position:absolute; top:15px; right:-34px; transform:rotate(34deg); background:#b4231f; color:#fff; font:800 11px 'JetBrains Mono'; letter-spacing:.16em; padding:5px 44px;\">СРОЧНО<\u002Fdiv>\n          <div style=\"font:600 11px 'JetBrains Mono'; letter-spacing:.06em; color:#5c3f08;\">СРОЧНОЕ ДЕЛО ДНЯ · 04:12:33<\u002Fdiv>\n          <div style=\"font:700 24px 'Spectral',serif; color:#3a2705; margin-top:7px;\">Сбой в матрице<\u002Fdiv>\n          <div style=\"display:flex; gap:9px; margin-top:14px;\">\n            <span style=\"font:700 12px 'Inter'; background:#3a2705; color:#f0c46b; padding:5px 11px; border-radius:6px;\">Награда ×5<\u002Fspan>\n            <span style=\"font:700 12px 'Inter'; background:rgba(58,39,5,.16); color:#3a2705; padding:5px 11px; border-radius:6px;\">Сложность ×2<\u002Fspan>\n            <span style=\"font:600 12px 'Inter'; color:#5c3f08; align-self:center;\">3 документа<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- GRID -->\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-top:14px;\">\n          <sc-for list=\"{{ grid }}\" as=\"g\" hint-placeholder-count=\"6\">\n            <div class=\"grid-folder\" style=\"position:relative; cursor:pointer; opacity:{{ g.op }};\">\n              <div style=\"width:96px; height:15px; background:{{ g.edge }}; border-radius:6px 6px 0 0; margin-left:14px;\"><\u002Fdiv>\n              <div style=\"background:{{ g.bg }}; border:1px solid {{ g.edge }}; border-radius:2px 8px 8px 8px; padding:15px 16px 15px; box-shadow:0 7px 16px rgba(40,28,10,.16); overflow:hidden;\">\n                <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:8px;\">\n                  <div style=\"min-width:0;\">\n                    <div style=\"font:600 9px 'JetBrains Mono'; letter-spacing:.06em; color:{{ g.sub }};\">{{ g.num }}<\u002Fdiv>\n                    <div style=\"font:700 16px/1.15 'Spectral',serif; color:{{ g.ink }}; margin-top:4px;\">{{ g.title }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"flex:none; font:700 9px 'JetBrains Mono'; letter-spacing:.05em; color:{{ g.chipInk }}; background:{{ g.chipBg }}; border:1px solid {{ g.chipBd }}; padding:3px 7px; border-radius:5px; white-space:nowrap;\">{{ g.chip }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font:500 11px 'Inter'; color:{{ g.sub }}; margin-top:8px;\">{{ g.meta }}<\u002Fdiv>\n                <div style=\"display:flex; justify-content:space-between; align-items:center; margin-top:13px; padding-top:11px; border-top:1px solid {{ g.line }};\">\n                  <span style=\"display:flex; gap:4px; align-items:center;\">\n                    <sc-for list=\"{{ g.pips }}\" as=\"p\" hint-placeholder-count=\"3\">\n                      <span style=\"width:6px; height:6px; border-radius:50%; background:{{ p.c }};\"><\u002Fspan>\n                    <\u002Fsc-for>\n                    <span style=\"font:600 9px 'JetBrains Mono'; color:{{ g.sub }}; margin-left:3px;\">{{ g.diffLabel }}<\u002Fspan>\n                  <\u002Fspan>\n                  <span style=\"font:700 11px 'Inter'; color:{{ g.ctaColor }};\">{{ g.cta }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"margin:14px 0 0; max-width:880px; font:400 12.5px/1.55 'Inter'; color:#8a7c60;\"><b style=\"color:#6e6149;\">Почему хорошо:<\u002Fb> лучший обзор прогресса при 38 делах, мгновенно видно что доступно/заблокировано, привычный паттерн «выбор уровня». <b style=\"color:#6e6149;\">Риск:<\u002Fb> чуть меньше «бумажной» интимности, чем у веера.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { aSel: 0 };\n\n  cases() {\n    // kind: daily | active | locked\n    return [\n      { num:'Дело дня', title:'Сбой в матрице',          short:'Сбой в матрице',  client:null,            sum:null,        docs:'3 документа', kind:'daily',  diff:2, diffLabel:'×2',     lock:null,                         confid:false },\n      { num:'Дело 1',   title:'Затопленная квартира',     short:'Затопл. кварт.',  client:'Игорь Семёнов', sum:'1 200 ₽',  docs:'2 документа', kind:'active', diff:1, diffLabel:'Лёгкое', lock:null,                         confid:true  },\n      { num:'Дело 2',   title:'Пожар в доме',             short:'Пожар в доме',    client:'Хелена Брандт', sum:'9 000 ₽',  docs:'2 документа', kind:'locked', diff:2, diffLabel:'Среднее',lock:'Закройте предыдущее дело',   confid:false },\n      { num:'Дело 3',   title:'Утонувший смартфон',       short:'Утон. смартфон',  client:'Тимур Аширов',  sum:'1 100 ₽',  docs:'3 документа', kind:'locked', diff:2, diffLabel:'Среднее',lock:'Откроется на ур. 2',         confid:false },\n      { num:'Дело 4',   title:'Дрон-похититель кольца',   short:'Дрон-похититель', client:null,           sum:null,        docs:'4 документа', kind:'locked', diff:3, diffLabel:'Сложное',lock:'Откроется на ур. 2',         confid:false },\n      { num:'Дело 5',   title:'Газонокосилка-беглец',     short:'Газонокосилка',   client:null,            sum:null,        docs:'3 документа', kind:'locked', diff:3, diffLabel:'Сложное',lock:'Откроется на ур. 3',         confid:false },\n      { num:'Дело 6',   title:'Пицца-Погром',             short:'Пицца-Погром',    client:null,            sum:null,        docs:'2 документа', kind:'locked', diff:3, diffLabel:'Сложное',lock:'Откроется на ур. 3',         confid:false },\n      { num:'Дело 7',   title:'Пёс-гурман',               short:'Пёс-гурман',      client:null,            sum:null,        docs:'3 документа', kind:'locked', diff:3, diffLabel:'Сложное',lock:'Откроется на ур. 4',         confid:false },\n      { num:'Дело 8',   title:'Корова на крыше',          short:'Корова на крыше', client:null,            sum:null,        docs:'4 документа', kind:'locked', diff:3, diffLabel:'Сложное',lock:'Откроется на ур. 4',         confid:false },\n    ];\n  }\n\n  colors(kind) {\n    if (kind === 'daily')  return { bg:'linear-gradient(135deg,#e6b052,#d6982f)', flat:'#dca73c', edge:'#b07d1f', ink:'#3a2705', sub:'#7a5410' };\n    if (kind === 'active') return { bg:'linear-gradient(135deg,#d8b95e,#cda646)', flat:'#d4b558', edge:'#a98a33', ink:'#2e2207', sub:'#6e5a24' };\n    return { bg:'#d3ccbb', flat:'#d3ccbb', edge:'#b3ab98', ink:'#6b6350', sub:'#8b8470' };\n  }\n\n  pips(diff, onColor, offColor) {\n    return [0,1,2].map(i => ({ c: i < diff ? onColor : offColor }));\n  }\n\n  renderVals() {\n    const cs = this.cases();\n    const sel = this.state.aSel;\n\n    // ---------- Concept A ----------\n    const aTabs = cs.map((c,i) => {\n      const col = this.colors(c.kind);\n      const isSel = i === sel;\n      return {\n        num: c.num, short: c.short, foot: c.kind==='locked' ? 'заблок.' : (c.kind==='daily' ? '×5' : 'доступно'),\n        bg: col.flat, edge: col.edge, ink: col.ink, sub: col.sub,\n        op: c.kind==='locked' ? '.62' : '1',\n        offset: isSel ? 0 : (8 + (i % 3) * 5),\n        sh: isSel ? '0 -6px 16px rgba(40,28,10,.16)' : 'none',\n        onPick: () => this.setState({ aSel: i }),\n      };\n    });\n    const a = cs[sel];\n    const aCol = this.colors(a.kind);\n    const aLocked = a.kind === 'locked';\n\n    // ---------- Concept B (fanned spread) ----------\n    const fanLayout = [\n      { i:5, x:120, y:150, rot:-9,  z:1 },\n      { i:4, x:300, y:120, rot:-3,  z:2 },\n      { i:6, x:470, y:140, rot:6,   z:1 },\n      { i:3, x:560, y:200, rot:11,  z:3 },\n      { i:0, x:70,  y:108, rot:-6,  z:6 },   // daily, top-left askew\n      { i:1, x:300, y:196, rot:0,   z:8 },   // active, front-center straight\n    ];\n    const fan = fanLayout.map(L => {\n      const c = cs[L.i]; const col = this.colors(c.kind);\n      const front = c.kind === 'active';\n      return {\n        x:L.x, y:L.y, rot:L.rot, z:L.z, w: front ? 300 : 250,\n        bg: col.bg, edge: col.edge, ink: col.ink, sub: col.sub,\n        num:c.num, title:c.title, daily: c.kind==='daily',\n        showMeta: c.kind!=='locked', locked: c.kind==='locked',\n        meta: c.client ? (c.client + ' · ' + c.sum) : (c.kind==='daily' ? 'Награда ×5 · сложность ×2' : ''),\n        docs: c.docs, cta:'Открыть дело →', lock: c.lock,\n      };\n    });\n\n    // ---------- Concept C (grid) ----------\n    const grid = cs.slice(1).map(c => {\n      const col = this.colors(c.kind);\n      const locked = c.kind === 'locked';\n      const chip = c.kind==='active' ? 'ДОСТУПНО' : 'ЗАКРЫТО';\n      return {\n        num:c.num, title:c.title,\n        bg: col.flat, edge: col.edge, ink: col.ink, sub: col.sub,\n        op: locked ? '.72' : '1',\n        line: locked ? 'rgba(0,0,0,.10)' : 'rgba(0,0,0,.15)',\n        meta: c.client ? (c.client + ' · ' + c.sum) : (locked ? c.lock : c.docs),\n        chip, \n        chipInk: locked ? '#8b8470' : '#2e6b3f',\n        chipBg:  locked ? 'rgba(0,0,0,.05)' : 'rgba(46,107,63,.12)',\n        chipBd:  locked ? 'rgba(0,0,0,.10)' : 'rgba(46,107,63,.3)',\n        pips: this.pips(c.diff, locked ? '#9b937f' : '#7a5410', 'rgba(0,0,0,.12)'),\n        diffLabel: c.diffLabel,\n        cta: locked ? 'заблокировано' : 'Открыть →',\n        ctaColor: locked ? '#9b937f' : '#2e2207',\n      };\n    });\n\n    return {\n      aTabs,\n      aBg: aCol.bg, aEdge: aCol.edge, aInk: aCol.ink, aSubInk: aCol.sub,\n      aNum: a.num, aTitle: a.title,\n      aDaily: a.kind==='daily', aConfid: a.confid,\n      aHasClient: !!a.client, aClient: a.client || '', aSum: a.sum || '',\n      aDocs: a.docs, aDiffLabel: a.diffLabel,\n      aPips: this.pips(a.diff, aLocked ? '#9b937f' : '#7a5410', 'rgba(0,0,0,.14)'),\n      aCta: aLocked ? a.lock : 'Открыть дело →',\n      aCtaColor: aLocked ? '#8b8470' : aCol.ink,\n\n      fan,\n      grid,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Claim Detective - Стол · раскладки папок.dc"}
  </script>
