<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Где ложь? Симулятор детектива</title>

    <!-- Typography: sans (UI chrome) + serif (documents) + mono (archive data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Yandex Games SDK. Loads before the app; engine degrades to offline
         (LocalStorage) if it is unavailable (e.g. local dev outside Yandex). -->
    <script src="https://yandex.ru/games/sdk/v2" async></script>

    <!-- Yandex Metrica loader. Defines the `window.ym` queueing stub and pulls
         tag.js asynchronously. The counter is *initialized* from
         src/services/metrica.ts (single-sourced counter ID in gameConfig); if
         that ID is a placeholder the queued calls are simply never flushed, so
         this snippet is harmless in dev / non-Yandex builds. -->
    <script type="text/javascript">
      (function (m, e, t, r, i, k, a) {
        m[i] =
          m[i] ||
          function () {
            (m[i].a = m[i].a || []).push(arguments);
          };
        m[i].l = 1 * new Date();
        for (var j = 0; j < e.scripts.length; j++) {
          if (e.scripts[j].src === r) return;
        }
        (k = e.createElement(t)),
          (a = e.getElementsByTagName(t)[0]),
          (k.async = 1),
          (k.src = r),
          a.parentNode.insertBefore(k, a);
      })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js', 'ym');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
