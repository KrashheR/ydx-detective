<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Где ложь? Симулятор детектива</title>

    <!-- Loaded before JavaScript so the first rendered frame is the game loader. -->
    <link rel="stylesheet" href="/src/index.css" />
    <link rel="stylesheet" href="/src/components/GameLoader/GameLoader.css" />

    <!-- Typography: sans (UI chrome) + serif (documents) + mono (archive data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Yandex Games SDK. Loads before the app; engine degrades to offline
         (LocalStorage) if it is unavailable (e.g. local dev outside Yandex). -->
    <script src="/sdk.js" async></script>

  </head>
  <body>
    <section
      id="static-game-loader"
      class="game-loader game-loader--static theme-manila"
      hidden
      role="status"
      aria-live="polite"
    >
      <picture class="game-loader__background" aria-hidden="true">
        <source
          media="(max-width: 700px), (orientation: portrait)"
          srcset="./game-loader/loader-bg-mobile.webp"
        />
        <img src="./game-loader/loader-bg-desktop.webp" alt="" draggable="false" />
      </picture>
      <div class="game-loader__wash" aria-hidden="true"></div>
      <div class="game-loader__vignette" aria-hidden="true"></div>
      <div class="game-loader__brand">
        <h1 class="game-loader__title">
          <span data-loader-copy="title"></span>
          <span class="game-loader__question" aria-hidden="true"></span>
        </h1>
        <div class="game-loader__subtitle" data-loader-copy="subtitle"></div>
        <div class="game-loader__stamp" data-loader-copy="stamp"></div>
      </div>
      <div class="game-loader__status-card">
        <div class="game-loader__status-row">
          <span data-loader-copy="phase"></span>
          <span class="game-loader__percent" aria-hidden="true">…</span>
        </div>
        <div
          class="game-loader__track"
          role="progressbar"
        >
          <div class="game-loader__fill"></div>
        </div>
        <p class="game-loader__tip">
          <span aria-hidden="true" class="game-loader__tip-icon">⌕</span>
          <span data-loader-copy="tip"></span>
        </p>
      </div>
    </section>
    <div id="root"></div>
    <script>
      // This compact copy table mirrors loader keys in src/i18n/ui.ts because it
      // must run before the TypeScript bundle exists.
      (function () {
        var copies = {
          ru: ['Где ложь', 'Симулятор детектива', 'Дело загружается', 'Загружаем игру…', 'Отказ в выплате требует доказательств. Найди и отметь противоречие.'],
          en: ['Where Is the Lie', 'Detective Simulator', 'Loading case', 'Loading game…', 'A rejected claim needs proof. Find and mark a contradiction.'],
          tr: ['Yalan Nerede', 'Dedektif Simülatörü', 'Dosya yükleniyor', 'Oyun yükleniyor…', 'Ödemeyi reddetmek için kanıt gerekir. Çelişkiyi bul ve işaretle.'],
          ar: ['أين الكذبة', 'محاكي المحقق', 'جارٍ تحميل القضية', 'جارٍ تحميل اللعبة…', 'رفض التعويض يحتاج إلى دليل. اعثر على التناقض وحدده.'],
          kk: ['Өтірік қайда', 'Детектив симуляторы', 'Іс жүктелуде', 'Ойын жүктелуде…', 'Төлемнен бас тарту үшін дәлел керек. Қайшылықты тауып, белгіле.']
        };
        var savedLocale = '';
        try {
          var saved = JSON.parse(localStorage.getItem('claimDetectiveSave') || 'null');
          savedLocale = saved && saved.stats ? saved.stats.language : '';
        } catch (_) {}
        var browserLocale = String(navigator.language || '').slice(0, 2).toLowerCase();
        var locale = Object.prototype.hasOwnProperty.call(copies, savedLocale)
          ? savedLocale
          : (Object.prototype.hasOwnProperty.call(copies, browserLocale) ? browserLocale : 'ru');
        var copy = copies[locale];
        var splash = document.getElementById('static-game-loader');
        var fields = splash.querySelectorAll('[data-loader-copy]');
        for (var i = 0; i < fields.length; i += 1) fields[i].textContent = copy[i];
        splash.dir = locale === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = locale;
        document.documentElement.dir = locale === 'ar' ? 'rtl' : 'ltr';
        splash.querySelector('.game-loader__question').textContent = locale === 'ar' ? '؟' : '?';
        splash.setAttribute('aria-label', copy[3]);
        splash.querySelector('[role="progressbar"]').setAttribute('aria-label', copy[3]);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
